<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Michael Fawler — Contacts — Bonsai</title>
  <link rel="stylesheet" href="./prototype-kit/styles/application.css" />
  <link rel="stylesheet" href="prototypes/contact-activity-email-v2/styles/local.css" />
</head>
<body>
<div id="outer-wrapper" class="with-sidebar with-sidebar-expanded">
  <span id="ph-sidebar"></span>
  <div class="page-content page-content-with-header">
    <span id="ph-topbar"></span>
    <div class="contact-page-body">
      <div class="contact-content-area">
        <div class="contact-main-content">
          <span id="ph-tab-activity"></span>
          <span id="ph-tab-notes"></span>
          <span id="ph-tab-meetings"></span>
          <span id="ph-tab-emails"></span>
        </div>
        <span id="ph-right-sidebar"></span>
      </div>
    </div>
    <span id="ph-meeting-panel"></span>
  </div>
</div>
<span id="ph-email-panel"></span>
<span id="ph-modals"></span>
<div id="toast-notification" class="toast-notification">
  <span class="toast-dot"></span>
  <span class="toast-msg"></span>
  <button class="toast-close" onclick="closeToast()">&#x2715;</button>
</div>
<script>
(function () {
  var base = 'prototypes/contact-activity-email-v2/';
  var partials = [
    { id: 'ph-sidebar',        src: base + 'partials/sidebar.html' },
    { id: 'ph-topbar',         src: base + 'partials/topbar.html' },
    { id: 'ph-tab-activity',   src: base + 'partials/tab-activity.html' },
    { id: 'ph-tab-notes',      src: base + 'partials/tab-notes.html' },
    { id: 'ph-tab-meetings',   src: base + 'partials/tab-meetings.html' },
    { id: 'ph-tab-emails',     src: base + 'partials/tab-emails.html' },
    { id: 'ph-right-sidebar',  src: base + 'partials/right-sidebar.html' },
    { id: 'ph-meeting-panel',  src: base + 'partials/meeting-panel.html' },
    { id: 'ph-email-panel',    src: base + 'partials/email-panel.html' },
    { id: 'ph-modals',         src: base + 'partials/modals.html' },
  ];
  var appScripts = [
    base + 'data/emails.js',
    base + 'data/meetings.js',
    base + 'data/contacts.js',
    base + 'js/helpers.js',
    base + 'js/tabs.js',
    base + 'js/notes.js',
    base + 'js/email-integration.js',
    base + 'js/email-panel.js',
    base + 'js/send-email.js',
    base + 'js/meeting-panel.js',
  ];
  function loadScript(src) {
    return new Promise(function (resolve, reject) {
      var s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = reject;
      document.body.appendChild(s);
    });
  }
  function loadScriptsSequentially(srcs) {
    return srcs.reduce(function (chain, src) {
      return chain.then(function () { return loadScript(src); });
    }, Promise.resolve());
  }
  // Load partials, then fix DOM structure, then load scripts
  Promise.all(
    partials.map(function (p) {
      return fetch(p.src)
        .then(function (r) { return r.text(); })
        .then(function (html) {
          var el = document.getElementById(p.id);
          if (el) el.outerHTML = html;
        });
    })
  ).then(function () {
    // The topbar partial opens a <div class="contact-page-body"> that creates
    // a duplicate. Merge: move the content-area into the first (topbar's) body
    // and remove the empty second one.
    var bodies = document.querySelectorAll('.contact-page-body');
    if (bodies.length === 2) {
      var outer = bodies[0];
      var inner = bodies[1];
      while (inner.firstChild) {
        outer.appendChild(inner.firstChild);
      }
      inner.remove();
    }
    return loadScriptsSequentially(appScripts);
  });
})();
</script>
</body>
</html>
